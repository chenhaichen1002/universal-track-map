<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Tracker Pro - Visualizer</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDHM7DZddYSOlafGz4Et_u75D6R2-IH12A&callback=initMap&libraries=places" async defer></script>
    <style>
        :root { --primary: #e60012; --bg: #f0f2f5; --text: #333; }
        body { font-family: 'Segoe UI', Meiryo, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 380px 1fr; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: 92vh; display: flex; flex-direction: column; box-sizing: border-box; }
        h1 { font-size: 1.2rem; color: var(--primary); margin: 0 0 15px 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input, select, button { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        #map { height: 92vh; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); background: #ddd; }
        .history-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; border-top: 1px solid #eee; }
        .status-item { padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem; line-height: 1.4; }
        .status-item.no-map { color: #888; background: #fcfcfc; border-left: 4px solid #eee; opacity: 0.7; }
        .status-item b { color: var(--primary); }
        .time-label { display: block; color: #666; font-size: 0.75rem; margin-bottom: 3px; font-weight: normal; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } #map, .panel { height: auto; min-height: 400px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h1>📦 Logistics Visualizer</h1>
        <input type="text" id="carrier-query" placeholder="業者を検索..." oninput="searchCarriers(this.value)">
        <select id="carrier-select" size="5"></select>
        <input type="text" id="track-no" placeholder="追跡番号を入力">
        <button onclick="startTracking()">ルートを描画</button>
        <div class="history-list" id="history-list"></div>
    </div>
    <div id="map"></div>
</div>

<script>
    let map, markers = [], polyline, placesService;
    const API_URL = "https://apis.tracker.delivery/graphql";
    const PROXY = "https://corsproxy.io/?";
    const AUTH_KEY = "TRACKQL-API-KEY AA6d1TAttqgabHvJkWx5asrw:hpGjoOr1gtcz0PNAgxlyenZBDOqNd7xKNUuOLdXiz3";
    
    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 5, center: { lat: 34.6937, lng: 135.5023 }, // 初期位置を日本中心寄りに
            styles: [{ featureType: "poi", stylers: [{ visibility: "off" }] }]
        });
        placesService = new google.maps.places.PlacesService(map);
        searchCarriers("");
    }

    async function searchCarriers(text) {
        const query = `query($t:String){carriers(searchText:$t,first:15){edges{node{id name}}}}`;
        try {
            const res = await fetch(PROXY + encodeURIComponent(API_URL), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': AUTH_KEY },
                body: JSON.stringify({ query, variables: { t: text || "" } })
            });
            const data = await res.json();
            const select = document.getElementById("carrier-select");
            select.innerHTML = "";
            if(data.data?.carriers.edges) {
                data.data.carriers.edges.forEach(e => select.add(new Option(e.node.name, e.node.id)));
                if (!text) select.selectedIndex = 0;
            }
        } catch (e) { console.error(e); }
    }

    async function startTracking() {
        const carrierId = document.getElementById("carrier-select").value;
        const trackNo = document.getElementById("track-no").value.trim();
        if (!carrierId || !trackNo) return alert("入力してください");

        const query = `query($c:ID!,$n:String!){track(carrierId:$c,trackingNumber:$n){events(last:40){edges{node{time description status{name}}}}}}`;
        try {
            const res = await fetch(PROXY + encodeURIComponent(API_URL), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': AUTH_KEY },
                body: JSON.stringify({ query, variables: { c: carrierId, n: trackNo } })
            });
            const result = await res.json();
            if (result.data?.track) {
                renderRoute(result.data.track.events.edges);
            } else {
                alert("データが見つかりませんでした。");
            }
        } catch (e) { console.error(e); }
    }

    async function renderRoute(edges) {
        clearMap();
        const historyList = document.getElementById("history-list");
        historyList.innerHTML = "";
        const pathCoords = [];
        let lastValidLocationName = "";

        for (const edge of edges) {
            const node = edge.node;
            const status = node.status.name;
            const fullDesc = (node.description || "").trim();

            // --- 1. 時刻の表示処理 ---
            let timeHtml = "";
            if (node.time) {
                const dateObj = new Date(node.time);
                const formattedTime = dateObj.getFullYear() + '/' + 
                                    ('0' + (dateObj.getMonth() + 1)).slice(-2) + '/' + 
                                    ('0' + dateObj.getDate()).slice(-2) + ' ' + 
                                    ('0' + dateObj.getHours()).slice(-2) + ':' + 
                                    ('0' + dateObj.getMinutes()).slice(-2);
                timeHtml = `<span class="time-label">${formattedTime}</span>`;
            }

            // --- 2. 場所の抽出 (サテライト情報維持) ---
            // 「 - 」で分割し、左側をすべて場所として採用。右側のステータス（輸送中など）は捨てる。
            let searchCity = fullDesc.includes(" - ") ? fullDesc.split(" - ")[0].trim() : fullDesc;
            
            // --- 3. 地図判定ロジック ---
            // 状態のみを示すキーワード（これらと完全一致する場合は場所ではないと判断）
            const pureStatusWords = ["引受", "受付", "中継", "保留", "税関", "調査中", "不在", "変更", "希望", "持ち戻り", "出発", "通過", "輸送中", "配達完了", "お届け先にお届け済み"];
            // 拠点であることを示すキーワード
            const locationSigns = ["局", "店", "分室", "ベース", "センター", "営業所", "作業店", "支店", "（", "(", "市", "区", "町", "村", "INT", "CENTER"];

            const isPureStatus = pureStatusWords.some(word => searchCity === word);
            const hasLocationSign = locationSigns.some(k => searchCity.includes(k));
            const isAlphaLocation = /^[A-Z]{3,}$/i.test(searchCity);

            // 最終判定：ステータス単語そのものではなく、かつ拠点キーワードを含むか、一定以上の長さがある場合
            const isRealLocation = !isPureStatus && (hasLocationSign || isAlphaLocation || searchCity.length >= 4);

            // --- 4. 履歴リストへ追加 ---
            const item = document.createElement("div");
            item.className = `status-item ${!isRealLocation ? 'no-map' : ''}`;
            item.innerHTML = `<b>${status}</b><br>${timeHtml}${fullDesc}`;
            historyList.appendChild(item);

            // --- 5. 地図処理 ---
            // 場所として不適格、または前回と同じ場所ならスキップ
            if (!isRealLocation || searchCity === lastValidLocationName) continue;

            const coord = await getBestCoordWithPlaces(searchCity);
            if (coord) {
                pathCoords.push(coord);
                lastValidLocationName = searchCity;
                
                const marker = new google.maps.Marker({
                    position: coord,
                    map: map,
                    label: { text: pathCoords.length.toString(), color: "white", fontWeight: "bold" },
                    title: searchCity,
                    zIndex: 999
                });
                markers.push(marker);
            }
        }

        // ルート線描画
        if (pathCoords.length > 1) {
            polyline = new google.maps.Polyline({
                path: pathCoords, geodesic: true, strokeColor: "#e60012",
                strokeOpacity: 0.8, strokeWeight: 5, map: map
            });
            const bounds = new google.maps.LatLngBounds();
            pathCoords.forEach(c => bounds.extend(c));
            map.fitBounds(bounds);
        } else if (pathCoords.length === 1) {
            map.setCenter(pathCoords[0]);
            map.setZoom(12);
        }
    }

    async function getBestCoordWithPlaces(address) {
        return new Promise(r => {
            // 日本国内の営業所特定精度を上げるため、検索クエリを調整
            const request = {
                query: address, 
                fields: ['geometry'],
                locationBias: { lat: 35.68, lng: 139.76 } // 日本を優先
            };
            placesService.findPlaceFromQuery(request, (results, status) => {
                if (status === google.maps.places.PlacesServiceStatus.OK && results) {
                    r(results[0].geometry.location);
                } else { 
                    // ヒットしない場合、少し広い範囲で再試行（フォールバック）
                    r(null); 
                }
            });
        });
    }

    function clearMap() {
        markers.forEach(m => m.setMap(null));
        markers = [];
        if (polyline) polyline.setMap(null);
    }
</script>
</body>
</html>
